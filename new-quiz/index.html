<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizCraft - Novi kviz</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <main class="phone">
        <header class="header">
            <div class="logo">
                <img src="/logo2.png" alt="Logo - QuizCraft">
            </div>
            <div class="streak">🔥 Streak 5 dana</div>
        </header>

        <h1>Novi kviz</h1>
        <p class="small">Učitaj skriptu i postavi kviz.</p>

        <p class="section-title">Učitaj izvor</p>

        <section class="upload-box">
            📄<br>
            Biologija_fotosinteza_i
            _stanična_dioba.pdf
            <p class="small" style="margin-top: 6px;">PDF dokument je odabran</p>
        </section>

        <p class="section-title">Broj pitanja</p>

        <div class="option-grid">
            <div class="option">5</div>
            <div class="option active">10</div>
            <div class="option">15</div>
        </div>

        <p class="section-title">Tema</p>

        <div class="chips">
            <div class="chip active">Sve teme</div>
            <div class="chip">Fotosinteza</div>
            <div class="chip">Stanična dioba</div>
        </div>

        <p class="section-title">Težina</p>

        <div class="option-grid">
            <div class="option">Lako</div>
            <div class="option active">Srednje</div>
            <div class="option">Teško</div>
        </div>

        <a href="/quiz/" class="btn btn-primary">Generiraj kviz</a>

        <nav class="bottom-nav">
            <a href="/home/" class="nav-item active">Početna</a>
            <a href="../new-quiz/" class="nav-item">Novi kviz</a>
            <a href="../statistics/" class="nav-item">Statistika</a>
            <a href="/login/" class="nav-item">Profil</a>
        </nav>
    </main>
</body>
</html>
