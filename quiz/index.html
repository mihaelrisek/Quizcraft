<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizCraft - Kviz pitanje</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <main class="phone">
        <div class="quiz-top">
            <a href="../new-quiz/" class="back">‹</a>
            <strong>Pitanje 3/10</strong>
            <span class="badge purple">+10 XP</span>
        </div>

        <div class="progress-line">
            <div class="progress-fill"></div>
        </div>

        <span class="badge green">Biologija</span>

        <section class="question-card">
            <h2>Koja je prva faza diobe stanice u mitozi?</h2>
            <div class="question-image">🧬</div>
        </section>

        <section>
            <div class="answer">
                <div class="answer-letter">A</div>
                Metafaza
            </div>

            <div class="answer correct">
                <div class="answer-letter">B</div>
                Profaza
            </div>

            <div class="answer wrong">
                <div class="answer-letter">C</div>
                Anafaza
            </div>

            <div class="answer">
                <div class="answer-letter">D</div>
                Telofaza
            </div>
        </section>

        <section class="feedback">
            <h3>Netočno</h3>
            <p><strong>Tvoj odgovor:</strong> Anafaza</p>
            <p><strong>Točan odgovor:</strong> Profaza</p>
            <p class="small" style="margin-top: 8px;">
                Profaza je prva faza mitoze u kojoj se kromosomi kondenziraju,
                a jezgrina ovojnica počinje nestajati.
            </p>
        </section>

        <a href="../results/" class="btn btn-purple">Dalje</a>
    </main>
</body>
</html>
